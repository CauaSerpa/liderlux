server {
    listen 80;
    server_name _;
    root /var/www;
    index index.php index.html;

    # Logs
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # Configuração upstream PHP
    upstream php-upstream {
        server app:9000;
    }

    # Arquivos estáticos
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        log_not_found off;
        access_log off;
    }

    # ROTAS PRINCIPAIS (CodeIgniter)
    location / {
        try_files $uri $uri/ /index.php?$args;
    }

    # PHP HANDLER
    location ~ \.php$ {
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass php-upstream;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_intercept_errors off;
        fastcgi_buffer_size 16k;
        fastcgi_buffers 4 16k;
        fastcgi_connect_timeout 300;
        fastcgi_send_timeout 300;
        fastcgi_read_timeout 300;
    }

    # BLOQUEAR ACESSO A PASTAS SENSÍVEIS
    location ~* ^/(application|system|docker|\.env|db|sql|config) {
        deny all;
        return 403;
    }

    # BLOQUEAR ARQUIVOS OCULTOS
    location ~ /\.(env|git|htaccess|svn|idea) {
        deny all;
        return 403;
    }

    # BLOQUEAR ARQUIVOS DE LOG E CONFIG
    location ~* \.(log|sql|ini|conf|sh|sqlite|bak|old)$ {
        deny all;
        return 403;
    }

    # Healthcheck endpoint (sem logs)
    location = /health {
        access_log off;
        try_files $uri /index.php?$args;
    }

    # Negar acesso a arquivos que começam com ponto
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}