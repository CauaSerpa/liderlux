# Criar arquivo de configuração
cat > sonar-project.properties << 'EOF'
# Configuração do SonarCloud
sonar.projectKey=seu-usuario_liderlux
sonar.organization=seu-usuario

# Ou use variáveis de ambiente
# sonar.projectKey=${SONAR_PROJECT_KEY}
# sonar.organization=${SONAR_ORG}

# Fontes do projeto
sonar.sources=application/
sonar.exclusions=**/vendor/**, **/assets/**, **/system/**, **/docker/**, **/tests/**

# PHP específico
sonar.php.coverage.reportPath=coverage.xml
sonar.php.tests.reportPath=tests/report.xml

# Encoding
sonar.sourceEncoding=UTF-8

# Versão do projeto (opcional)
sonar.projectVersion=1.0.0
EOF