version: "3.9"

services:
  app:
    image: liderlux:current
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    working_dir: /var/www
    env_file:
      - .env
    environment:
      - CI_ENV=${CI_ENV}
    depends_on:
      - db
    networks:
      - erp_net

  nginx:
    image: nginx:alpine
    container_name: liderlux_nginx
    restart: unless-stopped
    ports:
      - "8085:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - erp_net

  db:
    image: mariadb:10.6
    container_name: liderlux_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./docker/db/init:/docker-entrypoint-initdb.d
    networks:
      - erp_net

networks:
  erp_net:

volumes:
  db_data: