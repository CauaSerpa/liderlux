name: CI Pipeline
on:
  pull_request:
    branches: [develop, hml, main]
  push:
    branches: [develop, hml]

jobs:
  ci:
    name: Code Quality + Build
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Necessário para qualidade de código

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer, phpunit

      # 1. VALIDAÇÃO DE DEPENDÊNCIAS
      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: composer-${{ hashFiles('**/composer.lock') }}

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      # 2. VALIDAÇÃO DE SINTAXE PHP
      - name: PHP syntax check
        run: |
          find . -name "*.php" -not -path "./vendor/*" -exec php -l {} \;
          echo "✅ PHP syntax check passed"

      # 3. TESTES UNITÁRIOS (se existirem)
      - name: Run PHPUnit tests
        run: |
          if [ -f "phpunit.xml" ]; then
            vendor/bin/phpunit --coverage-text --stop-on-failure
          else
            echo "❌ PHPUnit configuration NOT found - Tests required!"
            exit 1  # Falha o pipeline se não tem testes configurados
          fi

      # 4. ANÁLISE ESTÁTICA (recomendado)
      - name: PHPStan
        run: |
          if [ -f "vendor/bin/phpstan" ]; then
            vendor/bin/phpstan analyse src --level=5
          else
            echo "⚠️ PHPStan not configured"
          fi

      # 5. SONARCLOUD (SÓ RODA SE TUDO ACIMA PASSAR)
      - name: SonarCloud Scan
        if: success()  # Só executa se steps anteriores foram bem sucedidos
        uses: SonarSource/sonarcloud-github-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: >
            -Dsonar.organization=${{ vars.SONAR_ORG }}
            -Dsonar.projectKey=${{ vars.SONAR_PROJECT_KEY }}
            -Dsonar.php.tests.reportPath=tests/_output/report.xml
            -Dsonar.php.coverage.reportPath=tests/_output/coverage.xml

      # 6. BUILD DA IMAGEM DOCKER (TESTE DE BUILD)
      - name: Build Docker Image
        if: success()
        run: |
          docker build --pull -t liderlux:test .
          echo "✅ Docker build successful"

      # 7. TESTE DE INTEGRAÇÃO (SOBE O CONTAINER)
      - name: Test Docker container
        if: success()
        run: |
          # Sobe o container em background
          docker compose up -d

          # Aguarda healthcheck
          timeout=30
          while [ $timeout -gt 0 ]; do
            if docker compose ps app | grep -q "healthy"; then
              echo "✅ Container is healthy"
              break
            fi
            sleep 2
            timeout=$((timeout-2))
          done

          if [ $timeout -le 0 ]; then
            echo "❌ Container failed to become healthy"
            docker compose logs
            exit 1
          fi

          # Testa se a aplicação responde
          curl -f http://localhost:8085 || exit 1

          # Limpa
          docker compose down

      # 8. SEGURANÇA (SCAN DE VULNERABILIDADES)
      - name: Security scan
        if: success()
        run: |
          docker scan liderlux:test || echo "⚠️ Docker scan not available"
          # Ou usar: trivy image liderlux:test

      # 9. LOGIN E PUSH (APENAS EM PUSH, NÃO EM PR)
      - name: Login Docker Hub
        if: success() && github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASS }}

      - name: Push Docker Image
        if: success() && github.event_name == 'push'
        run: |
          docker tag liderlux:test ${{ secrets.DOCKER_USER }}/liderlux:${{ github.sha }}
          docker push ${{ secrets.DOCKER_USER }}/liderlux:${{ github.sha }}

          # Só marca como latest se for main/hml
          if [ "${{ github.ref_name }}" = "main" ] || [ "${{ github.ref_name }}" = "hml" ]; then
            docker tag liderlux:test ${{ secrets.DOCKER_USER }}/liderlux:latest
            docker push ${{ secrets.DOCKER_USER }}/liderlux:latest
          fi

      # 10. QUALITY GATE - Verificação final para PRs
      - name: Quality Gate Check
        if: github.event_name == 'pull_request'
        run: |
          echo "✅ All quality checks passed!"
          echo "✅ PR can be merged!"

      # 11. Status final explícito (GitHub vai bloquear merge se falhar)
      - name: Final Status
        if: always()
        run: |
          if [ "${{ job.status }}" != "success" ]; then
            echo "❌ Pipeline failed - PR cannot be merged!"
            exit 1
          fi